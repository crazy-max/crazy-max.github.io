<section class="container page post">
  <article>
    <header>
      <div class="post-title">
        <h1 class="title">
          <a class="title-link" href="{{ .Permalink | safeURL }}">
            {{ .Title }}
          </a>
        </h1>
      </div>
      <div class="post-meta">
        <div class="date">
          <span class="posted-on">
            <i class="fa-solid fa-calendar" aria-hidden="true"></i>
            <time datetime="{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}">
              {{ .Lastmod | time.Format (.Site.Params.dateFormat | default "January 2, 2006") }}
            </time>
          </span>
        </div>
      </div>
    </header>

    {{ .Content }}
  </article>
</section>
